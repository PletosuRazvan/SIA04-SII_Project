server.port=8094
server.servlet.context-path=/DSA-DOC-XLSService/rest

# XLSX data source - Olympics data
xlsx.data.source.file.path=datasource/OlympicsData.xlsx

server.error.include-stacktrace=always
server.error.include-message=always

# logging
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n
logging.level.org.hibernate.SQL=info

# SpringBoot Security
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.SecurityAutoConfiguration
spring.security.user.name=developer
spring.security.user.password=iis
